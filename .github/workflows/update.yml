name: Update IPv4 address lists

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq whois curl iprange ipcalc

      # ---------------- GOOGLE ----------------

      - name: Google Cloud + AI Studio
        run: |
          curl -s https://www.gstatic.com/ipranges/goog.json \
          | jq -r '.prefixes[].ipv4Prefix // empty' \
          | grep -vE '^8\.8\.8\.0/24|^8\.8\.4\.0/24' \
          > google_cloud_aistudio.txt

      - name: YouTube (Google ranges)
        run: |
          cp google_cloud_aistudio.txt youtube.txt

      # ---------------- META ----------------

      - name: Meta (Facebook, Instagram, WhatsApp)
        run: |
          whois -h whois.radb.net -- "-i origin AS32934" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" \
          | sort -u > meta.txt

      # ---------------- DISCORD ----------------

      - name: Discord
        run: |
          whois -h whois.radb.net -- "-i origin AS49544" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" \
          | sort -u > discord.txt

      # ---------------- ROBLOX ----------------

      - name: Roblox
        run: |
          whois -h whois.radb.net -- "-i origin AS22697" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" \
          | sort -u > roblox.txt

      # ---------------- PERPLEXITY ----------------

      - name: Perplexity IPv4
        run: |
          whois -h whois.radb.net -- "-i origin AS16509" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" > perplexity.txt

          whois -h whois.radb.net -- "-i origin AS14618" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" >> perplexity.txt

          sort -u perplexity.txt -o perplexity.txt

      # ---------------- OPENAI ----------------

      - name: OpenAI ChatGPT IPv4
        run: |
          whois -h whois.radb.net -- "-i origin AS8075" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" > openai_chatgpt.txt

          whois -h whois.radb.net -- "-i origin AS13335" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" >> openai_chatgpt.txt

          sort -u openai_chatgpt.txt -o openai_chatgpt.txt

      # ---------------- TELEGRAM ----------------

      - name: Telegram
        run: |
          curl -s https://core.telegram.org/resources/cidr.txt \
          | grep -v ":" > telegram.txt

      # ---------------- COLLAPSE ----------------

      - name: Collapse CIDR ranges
        run: |
          for file in google_cloud_aistudio.txt meta.txt youtube.txt discord.txt roblox.txt telegram.txt perplexity.txt openai_chatgpt.txt
          do
            cat "$file" | ipcalc -n | sort -u > tmp.txt
            mv tmp.txt "$file"
          done

      # ---------------- COMMIT ----------------

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Weekly IPv4 update (collapsed)" || exit 0
          git push
