name: Update IPv4 address lists

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq whois curl

      - name: Google Cloud + AI Studio
        run: |
          curl -s https://www.gstatic.com/ipranges/goog.json \
          | jq -r '.prefixes[].ipv4Prefix // empty' \
          | grep -vE '^8\.8\.8\.0/24|^8\.8\.4\.0/24' \
          > google_cloud_aistudio.txt

      - name: YouTube (Google ranges)
        run: |
          cp google_cloud_aistudio.txt youtube.txt

      - name: Meta (Facebook, Instagram, WhatsApp)
        run: |
          whois -h whois.radb.net -- "-i origin AS32934" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" \
          | sort -u > meta.txt

      - name: Discord
        run: |
          whois -h whois.radb.net -- "-i origin AS49544" \
          | grep -Eo "([0-9]+\.){3}[0-9]+" \
          | sort -u > discord.txt

      - name: Roblox
        run: |
          whois -h whois.radb.net -- "-i origin AS22697" \
          | grep -Eo "([0-9]+\.){3}[0-9]+/[0-9]+" \
          | sort -u > roblox.txt

      - name: Telegram
        run: |
          curl -s https://core.telegram.org/resources/cidr.txt \
          | grep -v ":" > telegram.txt

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Weekly IPv4 update" || exit 0
          git push
